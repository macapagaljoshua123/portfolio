<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Joshua Macapagal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .error-container {
      text-align: center;
      padding: 2rem;
      animation: fadeInUp 0.6s ease-out;
    }
    
    h1 {
      font-size: 8rem;
      margin: 0;
      line-height: 1;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
    
    .glitch {
      font-size: 8rem;
      position: relative;
      animation: glitch 3s infinite;
    }
    
    p {
      font-size: 1.5rem;
      margin: 1.5rem 0;
      opacity: 0.9;
    }
    
    .back-home {
      display: inline-block;
      padding: 1rem 2rem;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      margin-top: 1rem;
    }
    
    .back-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes glitch {
      0%, 100% { transform: skew(0deg, 0deg); }
      95%, 97% { transform: skew(2deg, 1deg); }
      96% { transform: skew(-2deg, -1deg); }
    }
    
    @media (max-width: 768px) {
      h1, .glitch { font-size: 4rem; }
      p { font-size: 1.2rem; }
      .back-home { padding: 0.75rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="glitch">404</div>
    <p>Oops! The page you're looking for has vanished into the digital void.</p>
    <a href="/" class="back-home">← Return to Portfolio</a>
  </div>
</body>
</html>
